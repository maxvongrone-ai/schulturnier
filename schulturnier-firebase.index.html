                                    {d.shots>0&&<div style={{fontSize:11,color:"#fb923c",marginTop:2}}>{d.goals}/{d.shots} Treffer</div>}
                                  </div>
                                );
                              })}
                            </div>
                            {tbInfo.includesFirst&&pvW&&pvF&&<div style={{marginTop:6,fontSize:11,color:"#4ade80",fontWeight:600}}>✓ Finale: {pvW} vs {pvF}</div>}
                            {!tbInfo.includesFirst&&pvW&&<div style={{marginTop:6,fontSize:11,color:"#4ade80",fontWeight:600}}>✓ {pvW} ins Finale</div>}
                          </div>
                        );
                      })()}
                    </div>
                  )}
                  {s.hasFinale&&(
                    <div style={{marginTop:8,background:"rgba(252,211,77,.1)",border:"1px solid rgba(252,211,77,.3)",borderRadius:10,padding:14}}>
                      <div style={{fontSize:12,fontWeight:600,color:"#fcd34d",marginBottom:10}}>🏆 Finale · {toTime(finaleStart)}</div>
                      <div style={{display:"flex",alignItems:"center",gap:12,justifyContent:"space-between"}}>
                        <span style={{fontWeight:fWinner===f1?700:400,color:"#fff",fontSize:14}}>{allPrelimDone?(tbPending?"Sieger Entsch.":f1):"Platz 1"}</span>
                        {fOk?<span style={{fontSize:24,fontWeight:700,color:"#fcd34d",fontFamily:"'DM Mono',monospace"}}>{fs.h} : {fs.a}</span>:<span style={{fontSize:13,color:"rgba(255,255,255,.3)"}}>{allPrelimDone?"Noch nicht gespielt":"Vorrunde läuft"}</span>}
                        <span style={{fontWeight:fWinner===f2?700:400,color:"#fff",fontSize:14,textAlign:"right"}}>{allPrelimDone?(tbPending?"Sieger Entsch.":f2):"Platz 2"}</span>
                      </div>
                    </div>
                  )}
                </div>
              )}

              {viewTab==="winner"&&(
                <div style={{textAlign:"center",padding:"8px 0"}}>
                  {fWinner?(
                    <>
                      <div style={{fontSize:64,marginBottom:8}}>🏆</div>
                      <div style={{fontSize:13,color:"rgba(255,255,255,.5)",marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Turniersieger {lvlMeta.label}</div>
                      <div className="viewer-winner" style={{fontSize:36,fontWeight:800,letterSpacing:-1,marginBottom:16}}>{fWinner}</div>
                      <div style={{display:"flex",gap:12,justifyContent:"center"}}>
                        {[{name:f1,medal:"🥇"},{name:f2,medal:"🥈"}].map(({name,medal})=>(
                          <div key={name} style={{background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.15)",borderRadius:10,padding:"10px 16px",minWidth:90}}>
                            <div style={{fontSize:22,marginBottom:4}}>{medal}</div>
                            <div style={{fontWeight:700,color:"#fff",fontSize:13}}>{name}</div>
                          </div>
                        ))}
                      </div>
                    </>
                  ):allPrelimDone&&tbPending?(
                    <>
                      <div style={{fontSize:48,marginBottom:8}}>{tbInfo?.type==="penalty"?"🎯":"⚔️"}</div>
                      <div style={{fontSize:15,fontWeight:600,color:"rgba(255,255,255,.8)",marginBottom:6}}>{tbInfo?.type==="penalty"?"Penalty Shoot-out läuft":"Entscheidungsspiel läuft"}</div>
                      <div style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>{f1} steht fest · Gegner wird ermittelt</div>
                    </>
                  ):allPrelimDone&&!fOk&&s.hasFinale?(
                    <>
                      <div style={{fontSize:48,marginBottom:8}}>⏳</div>
                      <div style={{fontSize:15,fontWeight:600,color:"rgba(255,255,255,.8)",marginBottom:6}}>Finale noch nicht gespielt</div>
                      <div style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>{f1} vs {f2} · {toTime(finaleStart)}</div>
                    </>
                  ):(
                    <>
                      <div style={{fontSize:48,marginBottom:8}}>⚽</div>
                      <div style={{fontSize:15,fontWeight:600,color:"rgba(255,255,255,.8)",marginBottom:6}}>Vorrunde läuft noch</div>
                      <div style={{fontSize:13,color:"rgba(255,255,255,.4)"}}>{doneGames} von {totalGames} Spielen</div>
                    </>
                  )}
                </div>
              )}
            </div>
          </div>
        )}

        <div className="viewer-card" style={{padding:14}}>
          <div style={{fontSize:10,fontWeight:600,color:"rgba(255,255,255,.4)",textTransform:"uppercase",letterSpacing:.8,marginBottom:12}}>Alle Klassenstufen</div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {activeLevels.map(l=>{
              const lvl=LEVELS.find(x=>x.id===l.id);
              const lSt=standings[l.id]||[],lSc=scores[l.id]||{},lFsc=fScores[l.id]||{};
              const lTbs=tbScores?.[l.id]||{},lPs=penScores?.[l.id]||{};
              const lTbInfo=tiebreakerInfo?.[l.id],lS=schedule[l.id];
              const fOkL=lFsc.h!=null&&lFsc.h!==""&&lFsc.a!=null&&lFsc.a!=="";
              const lAllDone=lS&&lS.games.every(g=>{const r=lSc[g.id];return r&&r.h!=null&&r.h!==""&&r.a!=null&&r.a!=="";});
              const{f1:lf1,f2:lf2}=getFinalists(lAllDone?lSt:null,lAllDone?lTbInfo:null,lTbs,lPs);
              const lWinner=fOkL?(+lFsc.h>+lFsc.a?lf1:+lFsc.h<+lFsc.a?lf2:null):(!lS?.hasFinale&&lAllDone)?lSt[0]?.name:null;
              const lDoneG=lS?lS.games.filter(g=>{const r=lSc[g.id];return r&&r.h!=null&&r.h!==""&&r.a!=null&&r.a!=="";}).length:0;
              const lTotalG=lS?.games.length||0;
              return(
                <div key={l.id} onClick={()=>{setSelLvl(l.id);setViewTab("winner");}}
                  style={{display:"flex",alignItems:"center",gap:10,padding:"9px 12px",borderRadius:8,background:curLvl===l.id?"rgba(255,255,255,.1)":"rgba(255,255,255,.04)",border:`1px solid ${curLvl===l.id?"rgba(255,255,255,.2)":"rgba(255,255,255,.06)"}`,cursor:"pointer"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:lvl.hue,flexShrink:0}}/>
                  <span style={{fontSize:12,fontWeight:500,color:"rgba(255,255,255,.8)",flex:1}}>{lvl.label}</span>
                  {lWinner?<span style={{fontSize:12,fontWeight:700,color:"#fbbf24"}}>🥇 {lWinner}</span>:<span style={{fontSize:11,color:"rgba(255,255,255,.35)"}}>{lDoneG}/{lTotalG}</span>}
                </div>
              );
            })}
          </div>
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:11,color:"rgba(255,255,255,.25)"}}>Live-Ansicht · Echtzeit-Update via Firebase · 27. Juni 2026</div>
      </div>
    </div>
  );
}

function Root(){
  const[fbReady,setFbReady]=useState(FB_READY);
  if(!fbReady){
    // Setup-Screen erst anzeigen, dann splash ausblenden
    document.getElementById("splash").style.display="none";
    document.getElementById("root").style.display="block";
    return <FirebaseSetup onDone={()=>setFbReady(true)}/>;
  }
  return <App/>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
</script>
</body>
</html>
